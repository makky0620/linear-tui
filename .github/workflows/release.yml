# This workflow builds and uploads binaries to GitHub Releases
# Triggered when release-plz creates a git tag (v*)

name: Release Binaries

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../linear-tui-${{ matrix.target }}.tar.gz linear-tui
          cd ../../..
          shasum -a 256 linear-tui-${{ matrix.target }}.tar.gz > linear-tui-${{ matrix.target }}.tar.gz.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/linear-tui.exe" -DestinationPath "linear-tui-${{ matrix.target }}.zip"
          (Get-FileHash "linear-tui-${{ matrix.target }}.zip" -Algorithm SHA256).Hash.ToLower() + "  linear-tui-${{ matrix.target }}.zip" | Out-File "linear-tui-${{ matrix.target }}.zip.sha256" -Encoding utf8

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.target }}
          path: |
            linear-tui-*.tar.gz
            linear-tui-*.tar.gz.sha256
            linear-tui-*.zip
            linear-tui-*.zip.sha256

  publish:
    name: Publish to GitHub Releases
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*
